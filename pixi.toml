[workspace]
channels = [
  "file:///data/conda_nightly",
  "https://prefix.dev/meta-forge",
  "conda-forge",
]
name = "rockstar"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[system-requirements]
cuda = "12.9"

[dependencies]
cuda = "12.9.*"
pytorch = "*"

[feature.dev.dependencies]
matplotlib = "*"
seaborn = "*"
pandas = "*"
jupyterlab = "*"
pytest = "*"
ruff = "*"
pre-commit = ">=4.3.0,<5"

[pypi-dependencies]
rockstar = { path = ".", editable = true }

[environments]
dev = { features = ["dev"], solve-group = "default" }
