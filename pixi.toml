[workspace]
channels = [
  "file:///data/conda_nightly",
  "https://prefix.dev/meta-forge",
  "conda-forge",
]
name = "etha"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[tasks.submit]
cmd = "kjobctl create slurm --first-node-ip -- --chdir $PIXI_PROJECT_ROOT --output $PIXI_PROJECT_ROOT/jobs-%j-%N.out --error $PIXI_PROJECT_ROOT/jobs-%j-%N.err {{ script }}"
args = ["script"]

[system-requirements]
cuda = "12.9"

[dependencies]
cuda = "12.9.*"
pytorch = "*"
ucx = {version = "*", channel = "conda-forge"}
nvshmem4py = "0.1.2.*"
pyzmq = ">=27.1.0,<28"
python-lmdb = ">=1.7.5,<2"
msgspec = ">=0.19.0,<0.20"
universal_pathlib = ">=0.3.4,<0.4"

[feature.dev.dependencies]
matplotlib = "*"
seaborn = "*"
pandas = "*"
jupyterlab = "*"
pytest = "*"
ruff = "*"
pre-commit = "*"

[pypi-dependencies]
etha = { path = ".", editable = true }

[environments]
dev = { features = ["dev"], solve-group = "default" }
