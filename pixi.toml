[workspace]
channels = [
  "https://prefix.dev/meta-forge",
  "https://repo.prefix.dev/meta-pty",
  "conda-forge",
]
name = "rl_comm"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
integrate-test = "python tests/integrate_tests/run_tests.py"

[system-requirements]
cuda = "12.6"

[dependencies]
cuda = "12.6.*"
pytorch = "*"
matplotlib = ">=3.10.3,<4"
seaborn = ">=0.13.2,<0.14"
pandas = ">=2.3.1,<3"
nccl-tests = ">=2.16.4,<3"
parakernel = ">=0.2.0,<0.3"
jupyterlab = ">=4.4.4,<5"

[pypi-dependencies]
rl_comm = { path = ".", editable = true }

[feature.dev.dependencies]
pytest = "*"
ruff = "*"

[environments]
dev = { features = ["dev"] }
