[workspace]
channels = [
  "https://srgconda.bj.bcebos.com/",
  "https://prefix.dev/meta-forge",
  "conda-forge",
]
name = "etha"
platforms = ["linux-64"]
version = "0.1.0"
preview = ["pixi-build"]

[system-requirements]
cuda = "12.9"

[dependencies]
etha = { path = "." }

[feature.dev.dependencies]
transformers = "*"
matplotlib = "*"
seaborn = "*"
pandas = "*"
jupyterlab = "*"
pytest = "*"
ruff = "*"
pre-commit = "*"
nccl-tests = ">=2.16.7,<3"
pytest-timeout = ">=2.4.0,<3"
mypy = ">=1.18.2,<2"
tyro = ">=0.9.35,<0.10"

[feature.dev.tasks]
test = "pytest tests"
submit = { cmd = "kjobctl create slurm --first-node-ip -- --chdir $PIXI_PROJECT_ROOT --output $PIXI_PROJECT_ROOT/jobs-%j-%N.out --error $PIXI_PROJECT_ROOT/jobs-%j-%N.err {{ script }}", args = ["script"] }

[feature.vllm.dependencies]
vllm = { path = "external/vllm-build" }

[feature.vllm.pypi-dependencies]
model-hosting-container-standards = ">=0.1.13, <1"

[feature.vllm.activation.env]
CUDA_HOME = "$CONDA_PREFIX"
LIBRARY_PATH = "$CONDA_PREFIX/lib:$CONDA_PREFIX/lib/stubs"
CPATH = "$CONDA_PREFIX/targets/x86_64-linux/include"
VLLM_ALLOW_INSECURE_SERIALIZATION = "1"

[feature.vllm.tasks]
vllm_weight_sync = "python examples/vllm_weight_sync/launch.py"

[environments]
dev = { features = ["dev"], solve-group = "default" }
vllm = { features = ["dev", "vllm"], solve-group = "vllm" }

[package]
name = "etha"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-python", version = "*" }

[package.host-dependencies]
python = "3.12.*"
hatchling = "*"

[package.run-dependencies]
python = "3.12.*"
pytorch = "*"
python-lmdb = "*"
msgspec = "*"
universal-pathlib = "*"
posix_ipc = "*"
etcdpy = "*"
sortedcontainers = "*"
