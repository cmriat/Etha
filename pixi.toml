[workspace]
channels = [
  "https://srgconda.bj.bcebos.com/",
  "https://prefix.dev/meta-forge",
  "conda-forge",
]
name = "etha"
platforms = ["linux-64"]
version = "0.1.0"

[tasks.submit]
cmd = "kjobctl create slurm --first-node-ip -- --chdir $PIXI_PROJECT_ROOT --output $PIXI_PROJECT_ROOT/jobs-%j-%N.out --error $PIXI_PROJECT_ROOT/jobs-%j-%N.err {{ script }}"
args = ["script"]

[system-requirements]
cuda = "12.9"

[dependencies]
pytorch = "*"
python-lmdb = "*"
msgspec = "*"
universal-pathlib = "*"
posix_ipc = "*"
etcdpy = ">=0.0.0.2,<0.0.0.3"

[feature.dev.dependencies]
transformers = "*"
matplotlib = "*"
seaborn = "*"
pandas = "*"
jupyterlab = "*"
pytest = "*"
ruff = "*"
pre-commit = "*"
nccl-tests = ">=2.16.7,<3"
pytest-timeout = ">=2.4.0,<3"
mypy = ">=1.18.2,<2"
tyro = ">=0.9.35,<0.10"

[feature.dev.tasks]
transfer_model = "bash prototyping/distributed_model_transfer/launch.sh"
test = "pytest tests"

[feature.raydev.dependencies]
ray-default = "*"

[feature.raydev.tasks]
transfer_tensor = "bash prototyping/distributed_tensor_transfer/launch.sh"

[pypi-dependencies]
etha = { path = ".", editable = true }

[environments]
dev = { features = ["dev"], solve-group = "default" }
raydev = { features = ["dev", "raydev"], solve-group = "dev" }
