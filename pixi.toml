[workspace]
channels = [
  "https://srgconda.bj.bcebos.com/",
  "https://prefix.dev/meta-forge",
  "conda-forge",
]
name = "etha"
platforms = ["linux-64"]
version = "0.1.0"
preview = ["pixi-build"]

[system-requirements]
cuda = "12.9"

[dependencies]

[feature.runtime.dependencies]
etha = { path = "." }

[feature.dev.dependencies]
matplotlib = "*"
seaborn = "*"
pandas = "*"
jupyterlab = "*"
pytest = "*"
ruff = "*"
pre-commit = "*"
nccl-tests = ">=2.16.7,<3"
pytest-timeout = ">=2.4.0,<3"
mypy = ">=1.18.2,<2"
tyro = ">=0.9.35,<0.10"

[feature.dev.tasks]
test = "pytest tests"
submit = { cmd = "kjobctl create slurm --first-node-ip -- --chdir $PIXI_PROJECT_ROOT --output $PIXI_PROJECT_ROOT/jobs-%j-%N.out --error $PIXI_PROJECT_ROOT/jobs-%j-%N.err {{ script }}", args = ["script"] }

[feature.vllm.dependencies]
vllm = { path = "recipes/vllm" }

[feature.vllm.pypi-dependencies]
model-hosting-container-standards = ">=0.1.13, <1"

[feature.vllm.tasks]
vllm_weight_sync = "python examples/vllm_weight_sync/launch.py"

[feature.docs.dependencies]
python = "3.12.*"
sphinx = ">=7"
myst-parser = "*"
sphinx-autoapi = "*"
sphinx-book-theme = "*"
sphinx-design = "*"
sphinx-copybutton = "*"
sphinx-autobuild = "*"
sphinxcontrib-mermaid = "*"
linkify-it-py = "*"

[feature.docs.tasks]
docs = "sphinx-build -b html docs docs/_build/html"
docs-serve = "sphinx-autobuild docs docs/_build/html --open-browser"
docs-clean = "rm -rf docs/_build"

[environments]
dev = { features = ["runtime", "dev"], solve-group = "default" }
vllm = { features = ["runtime", "dev", "vllm"], solve-group = "vllm" }
docs = { features = ["docs"], solve-group = "docs" }

[package]
name = "etha"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-python", version = "*" }

[package.host-dependencies]
python = "3.12.*"
hatchling = "*"

[package.run-dependencies]
python = "3.12.*"
pytorch = "*"
python-lmdb = "*"
msgspec = "*"
universal-pathlib = "*"
posix_ipc = "*"
etcdpy = "*"
sortedcontainers = "*"
