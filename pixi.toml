[workspace]
channels = [
  "file:///data/conda_nightly",
  "https://prefix.dev/meta-forge",
  "conda-forge",
]
name = "etha"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[tasks.submit]
cmd = "kjobctl create slurm --first-node-ip -- --chdir $PIXI_PROJECT_ROOT --output $PIXI_PROJECT_ROOT/jobs-%j-%N.out --error $PIXI_PROJECT_ROOT/jobs-%j-%N.err {{ script }}"
args = ["script"]

[system-requirements]
cuda = "12.9"

[dependencies]
cuda = "12.9.*"
pytorch = "*"
python-lmdb = "*"
msgspec = "*"
universal_pathlib = "*"
posix_ipc = "*"

[feature.dev.dependencies]
matplotlib = "*"
seaborn = "*"
pandas = "*"
jupyterlab = "*"
pytest = "*"
ruff = "*"
pre-commit = "*"
nccl-tests = ">=2.16.7,<3"

[pypi-dependencies]
etha = { path = ".", editable = true }

[environments]
dev = { features = ["dev"], solve-group = "default" }
