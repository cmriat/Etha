context:
  version: "0.20.2"
  # vllm-project/vllm @ v0.20.2 (commit bc150f50). Bump the tag and regenerate
  # patches/vllm-v0.20.2.patch when moving forward.
  tag: "v0.20.2"

package:
  name: vllm
  version: ${{ version }}

source:
  git: https://github.com/vllm-project/vllm.git
  tag: ${{ tag }}
  patches:
    - patches/vllm-v0.20.2.patch

build:
  number: 0
  script: build.sh
  noarch: python

requirements:
  host:
    - python 3.12.*
    - pip
    - hatchling
  run:
    - python 3.12.*
    - pytorch * *cuda*
    - torchvision
    - vllm-ext ==0.20.2
    - flashinfer
    - numba ==0.65.0
    - regex
    - cachetools
    - psutil
    - sentencepiece
    - numpy
    - requests >=2.26
    - tqdm
    - blake3
    - py-cpuinfo
    - transformers >=5.5.1
    - tokenizers >=0.22.2
    - protobuf >=5.29.6
    - fastapi >=0.115
    - aiohttp >=3.13.3
    - openai >=2.0
    - pydantic >=2.12
    - prometheus_client >=0.18
    - pillow
    - prometheus-fastapi-instrumentator >=7
    - tiktoken >=0.6
    - lm-format-enforcer ==0.11.3
    - outlines-core ==0.2.14
    - diskcache ==5.6.3
    - lark ==1.2.2
    - xgrammar >=0.1.32,<1
    - filelock >=3.16.1
    - partial-json-parser
    - pyzmq >=25
    - msgspec
    - gguf >=0.17
    - mistral-common >=1.11
    - opencv >=4.13
    - pyyaml
    - setuptools >=77,<81
    - einops
    - depyf ==0.20.0
    - cloudpickle
    - watchfiles
    - python-json-logger
    - loguru
    - ninja
    - pybase64
    - cbor2
    - ijson
    - setproctitle
    - packaging
    - nccl
    - nvidia-ml-py
    - uvloop
    - scipy
    - typing_extensions >=4.10
    - six >=1.16
    - openai-harmony >=0.0.3
    - llguidance >=1.3
    # CUDA dev headers + nvrtc — flashinfer JIT-compiles fused_moe at runtime.
    - cuda-libraries-dev
    - cuda-nvrtc-dev
    - cuda-nvcc
